name: Deploy PostgreSQL via ArgoCD

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      ARGOCD_SERVER:
        required: true
      ARGOCD_AUTH_TOKEN:
        required: true

jobs:
  ArgoSync:
    name: ArgoCD Sync
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/download/v2.12.4/argocd-linux-amd64
          sudo install -m 555 /tmp/argocd /usr/local/bin/argocd
          argocd version --client

      - name: Show diff (optional)
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          echo "=== ArgoCD diff for postgresql ==="
          argocd app diff postgresql \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure || true

      - name: Trigger ArgoCD Sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app sync postgresql \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --async

      - name: Wait for Sync Completion
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app wait postgresql \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --health \
            --timeout 300

      - name: Verify Application Status
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          STATUS=$(argocd app get postgresql \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --output json | jq -r '.status.sync.status')
          HEALTH=$(argocd app get postgresql \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --output json | jq -r '.status.health.status')

          echo "Sync Status: $STATUS"
          echo "Health Status: $HEALTH"

          if [ "$STATUS" != "Synced" ] || [ "$HEALTH" != "Healthy" ]; then
            echo "PostgreSQL deployment failed!"
            echo "Sync: $STATUS (expected: Synced)"
            echo "Health: $HEALTH (expected: Healthy)"
            exit 1
          fi
