---
# Gateway for public expenses-monitor endpoints.
# TLS Secrets are declared explicitly in certificates.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: expenses-monitor
  namespace: expenses-monitor
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  gatewayClassName: traefik
  listeners:
    # --- HTTPS listeners (TLS termination) ---
    - name: api-rust-https
      hostname: api-rust.expmonitor.freeddns.org
      port: 8443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: backend-rust-tls
      allowedRoutes:
        namespaces:
          from: Same

    - name: api-legacy-https
      hostname: api.expmonitor.freeddns.org
      port: 8443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: backend-tls
      allowedRoutes:
        namespaces:
          from: Same

    - name: companion-https
      hostname: expenses.expmonitor.freeddns.org
      port: 8443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: frontend-companion-tls
      allowedRoutes:
        namespaces:
          from: Same

    - name: frontend-https
      hostname: expmonitor.freeddns.org
      port: 8443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: frontend-tls
      allowedRoutes:
        namespaces:
          from: Same

    # --- HTTP listener (for redirect to HTTPS and ACME HTTP-01) ---
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
