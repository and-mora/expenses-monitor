apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: backend-rust
  name: backend-rust
  namespace: expenses-monitor
  annotations:
    # Deploy after migrations complete (migration job is PreSync)
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-rust
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: backend-rust
    spec:
      containers:
        - image: ghcr.io/and-mora/expenses-monitor:v1.3.1-backend-rust
          name: backend-rust
          env:
            - name: APP_DATABASE__HOST
              valueFrom:
                secretKeyRef:
                  name: db-connection-string
                  key: host
            - name: APP_DATABASE__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-db-credentials
                  key: postgres-password
            - name: APP_DATABASE__USERNAME
              valueFrom:
                secretKeyRef:
                  name: backend-db-credentials
                  key: postgres-username
            # JWT validation settings are required by backend-rust at startup.
            # The backend discovers JWKS signing keys from the configured issuer.
            # Only the AES key is supplied via Kubernetes Secret material.
            - name: APP_AUTHENTICATION__JWT_ISSUER
              value: "https://auth.expmonitor.freeddns.org/realms/expenses-monitor"
            - name: APP_AUTHENTICATION__JWT_AUDIENCE
              value: "frontend"
            - name: APP_AUTHENTICATION__JWT_CLOCK_SKEW_SECONDS
              value: "30"
            - name: APP_BANKING__TOKEN_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-rust-psd2-secrets
                  key: token-encryption-key
            - name: APP_OTLP__GRPC_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
#            - name: FRONTEND_ORIGIN_URL
#              value: "https://expmonitor.freeddns.org"
#            - name: OTEL_SERVICE_NAME
#              valueFrom:
#                configMapKeyRef:
#                  name: backend-config
#                  key: OTEL_SERVICE_NAME
          resources:
            requests:
              memory: "100Mi"
              cpu: "50m"
            limits:
              memory: "200Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            failureThreshold: 15
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            failureThreshold: 15
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      automountServiceAccountToken: false

---

apiVersion: v1
kind: Service
metadata:
  labels:
    app: backend-rust
  name: backend-rust
  namespace: expenses-monitor
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: backend-rust
  sessionAffinity: None
  type: ClusterIP
